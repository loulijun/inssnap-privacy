      --border: #e2e8f0;
      --link: #0f766e;

    }

      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);

      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      line-height: 1.3;
    }

    h2 {
      margin-top: 24px;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    p {
      margin: 0 0 12px;
    }

    ul {
      margin: 0 0 12px;
      padding-left: 24px;
    }

    li {
      margin-bottom: 4px;
    }

    .updated {
      color: var(--muted);
      margin-bottom: 16px;
    }

    a {
      color: var(--link);
    }
  </style>

    function getLangFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const rawLang = params.get("lang");
      if (!rawLang) {
        return "en";
      }

      const normalized = rawLang.trim().replace(/_/g, "-");
      if (policyByLang[normalized]) {
        return normalized;
      }

      const aliasByLowercase = {
        "zh-cn": "zh-CN",
        "zh-tw": "zh-TW"
      };

      const lower = normalized.toLowerCase();
      if (aliasByLowercase[lower]) {
        return aliasByLowercase[lower];
      }

      for (const key of Object.keys(policyByLang)) {
        if (key.toLowerCase() === lower) {
          return key;
        }
      }

      return "en";
    }

    function setNodeText(id, value) {
      const node = document.getElementById(id);
      if (node) {
        node.textContent = value;
      }
    }

    function renderPolicy() {
      const lang = getLangFromQuery();
      const policy = policyByLang[lang];

      document.documentElement.lang = lang;
      document.title = policy.title;

      setNodeText("title", policy.title);
      setNodeText("updated", policy.updated);
      setNodeText("collectHeading", policy.collectHeading);
      setNodeText("collectBody", policy.collectBody);
      setNodeText("inputHeading", policy.inputHeading);
      setNodeText("inputBody", policy.inputBody);
      setNodeText("downloadHeading", policy.downloadHeading);
      setNodeText("downloadBody", policy.downloadBody);
      setNodeText("analyticsHeading", policy.analyticsHeading);
      setNodeText("analyticsBody", policy.analyticsBody);
      setNodeText("adIdHeading", policy.adIdHeading);
      setNodeText("adIdBody", policy.adIdBody);
      setNodeText("securityHeading", policy.securityHeading);
      setNodeText("securityBody", policy.securityBody);
      setNodeText("dataRetentionHeading", policy.dataRetentionHeading);
      setNodeText("dataRetentionBody", policy.dataRetentionBody);
      setNodeText("childrenHeading", policy.childrenHeading);
      setNodeText("childrenBody", policy.childrenBody);
      setNodeText("changesHeading", policy.changesHeading);
      setNodeText("changesBody", policy.changesBody);
      setNodeText("contactHeading", policy.contactHeading);
      setNodeText("contactBody", policy.contactBody);

      // Third-party services with links
      const thirdPartyNode = document.getElementById("thirdPartyBody");
      if (thirdPartyNode && policy.thirdPartyList) {
        let html = policy.thirdPartyBody + "<ul>";
        for (const svc of policy.thirdPartyList) {
          html += `<li><strong>${svc.name}</strong> — ${svc.desc} (<a href="${svc.url}" target="_blank" rel="noopener noreferrer">${svc.name} Privacy Policy</a>)</li>`;
        }
        html += "</ul>";
        thirdPartyNode.innerHTML = html;
      }

      // User rights with list
      const userRightsNode = document.getElementById("userRightsBody");
      if (userRightsNode && policy.userRightsList) {
        let html = `<p>${policy.userRightsIntro}</p><ul>`;
        for (const right of policy.userRightsList) {
          html += `<li>${right}</li>`;
        }
        html += `</ul><p>${policy.userRightsOutro}</p>`;
        userRightsNode.innerHTML = html;
      }
    }

    renderPolicy();
  </script>
