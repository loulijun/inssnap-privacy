    function getLangFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const rawLang = params.get("lang");
      if (!rawLang) {
        return "en";
      }

      const normalized = rawLang.trim().replace(/_/g, "-");
      if (policyByLang[normalized]) {
        return normalized;
      }

      const aliasByLowercase = {
        "zh-cn": "zh-CN",
        "zh-tw": "zh-TW"
      };

      const lower = normalized.toLowerCase();
      if (aliasByLowercase[lower]) {
        return aliasByLowercase[lower];
      }

      for (const key of Object.keys(policyByLang)) {
        if (key.toLowerCase() === lower) {
          return key;
        }
      }

      return "en";
    }

    function setNodeText(id, value) {
      const node = document.getElementById(id);
      if (node) {
        node.textContent = value;
      }
    }

    function renderPolicy() {
      const lang = getLangFromQuery();
      const policy = policyByLang[lang];

      document.documentElement.lang = lang;
      document.title = policy.title;

      setNodeText("title", policy.title);
      setNodeText("updated", policy.updated);
      setNodeText("collectHeading", policy.collectHeading);
      setNodeText("collectBody", policy.collectBody);
      setNodeText("inputHeading", policy.inputHeading);
      setNodeText("inputBody", policy.inputBody);
      setNodeText("downloadHeading", policy.downloadHeading);
      setNodeText("downloadBody", policy.downloadBody);
      setNodeText("thirdPartyHeading", policy.thirdPartyHeading);
      setNodeText("contactHeading", policy.contactHeading);
      setNodeText("contactBody", policy.contactBody);

      const thirdPartyNode = document.getElementById("thirdPartyBody");
      if (thirdPartyNode) {
        thirdPartyNode.innerHTML =
          policy.thirdPartyBody +
          ' <a href="https://rapidapi.com/privacy" target="_blank" rel="noopener noreferrer">RapidAPI Privacy Policy</a>.';
      }
    }
